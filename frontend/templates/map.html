<!doctype html>
<html>
  <head>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      #map {
        height: 600px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      const map = L.map("map").setView([51.1657, 10.4515], 6); // Deutschland
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(
        map,
      );

      // Marker für Winzer hinzufügen (Daten von /api/wines)
      fetch("/api/wines")
        .then((response) => response.json())
        .then((wines) => {
          wines.forEach((wine) => {
            if (wine.latitude && wine.longitude) {
              L.marker([wine.latitude, wine.longitude])
                .addTo(map)
                .bindPopup(`<b>${wine.name}</b><br>${wine.winery}`);
            }
          });
        });
    </script>
  </body>
</html>
