<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Admin - Crawl starten</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        padding: 0;
        background: #f9f9f9;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      }
      h1 {
        margin-top: 0;
      }
      label {
        display: block;
        margin-bottom: 12px;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        padding: 10px 18px;
        border: none;
        border-radius: 4px;
        background: #1976d2;
        color: white;
        cursor: pointer;
        font-size: 16px;
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .message {
        margin-top: 16px;
        padding: 14px;
        border-radius: 4px;
      }
      .message.success {
        background: #e8f5e9;
        border: 1px solid #c8e6c9;
        color: #256029;
      }
      .message.error {
        background: #ffebee;
        border: 1px solid #ffcdd2;
        color: #c62828;
      }
      .task-info {
        margin-top: 0;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Admin: Crawl starten</h1>
      <p>Gib hier die URL eines Winzer-Shops ein, den du crawlen möchtest.</p>

      <form id="crawl-form">
        <label for="crawl-url">Winzer-URL</label>
        <input
          id="crawl-url"
          name="url"
          type="text"
          placeholder="https://www.example-winery.de/shop"
          required
        />
        <button type="submit" id="crawl-button">Crawl starten</button>
      </form>

      <div id="result" aria-live="polite"></div>

      <hr style="margin-top: 30px; margin-bottom: 30px;" />

      <h2>Verwaltung</h2>
      <button id="delete-db-button" style="background-color: #d32f2f;">Datenbank löschen</button>
    </div>

    <script>
      const form = document.getElementById('crawl-form');
      const button = document.getElementById('crawl-button');
      const urlInput = document.getElementById('crawl-url');
      const result = document.getElementById('result');
      const deleteDbButton = document.getElementById('delete-db-button');

      console.debug('Admin JS geladen', { form, button, urlInput, result, deleteDbButton });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        result.innerHTML = '';
        button.disabled = true;
        button.textContent = 'Starte Crawl…';

        const url = urlInput.value.trim();
        if (!url) {
          showMessage('Bitte gib eine gültige URL ein.', 'error');
          button.disabled = false;
          button.textContent = 'Crawl starten';
          return;
        }

        try {
          const response = await fetch('/admin/crawl/start', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ url }),
          });
          const text = await response.text();
          let data = null;
          try {
            data = JSON.parse(text);
          } catch (parseError) {
            console.warn('Antwort ist kein JSON:', parseError, text);
          }

          if (!response.ok) {
            const message = data?.error || text || `Fehler beim Starten des Crawls (${response.status}).`;
            const detail = data?.detail ? `\nDetail: ${data.detail}` : '';
            showMessage(`${message}${detail}`, 'error');
          } else {
            showMessage(`Crawl gestartet: ${data?.message || 'Task gestartet.'}`, 'success');
          }
        } catch (error) {
          console.error('Fetch-Fehler:', error);
          showMessage('Netzwerkfehler beim Starten des Crawls.', 'error');
        } finally {
          button.disabled = false;
          button.textContent = 'Crawl starten';
        }
      });

      deleteDbButton.addEventListener('click', async (event) => {
        event.preventDefault();
        const confirmed = confirm('Wirklich alle Weine aus der Datenbank löschen? Diese Aktion kann nicht rückgängig gemacht werden!');
        if (!confirmed) {
          return;
        }

        result.innerHTML = '';
        deleteDbButton.disabled = true;
        deleteDbButton.textContent = 'Lösche Datenbank…';

        try {
          const response = await fetch('/admin/database/clear', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
          });
          const text = await response.text();
          let data = null;
          try {
            data = JSON.parse(text);
          } catch (parseError) {
            console.warn('Antwort ist kein JSON:', parseError, text);
          }

          if (!response.ok) {
            const message = data?.error || text || `Fehler beim Löschen (${response.status}).`;
            const detail = data?.detail ? `\nDetail: ${data.detail}` : '';
            showMessage(`${message}${detail}`, 'error');
          } else {
            showMessage(`✅ ${data?.message || 'Datenbank geleert.'}`, 'success');
          }
        } catch (error) {
          console.error('Fetch-Fehler:', error);
          showMessage('Netzwerkfehler beim Löschen der Datenbank.', 'error');
        } finally {
          deleteDbButton.disabled = false;
          deleteDbButton.textContent = 'Datenbank löschen';
        }
      });

      function showMessage(text, type) {
        result.innerHTML = `<div class="message ${type}"><p>${text}</p></div>`;
      }
    </script>
  </body>
</html>
